<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-blue-200 min-h-screen flex items-center justify-center">
    
        <section class="bg-white p-8 rounded-2xl shadow-xl shadow-indigo-300 w-auto h-auto max-w-md">
            <div class="flex justify-center mb-4">
                <div class="bg-indigo-100 rounded-xl p-3 inline-block">
                    <img src="images/profile1.png" alt="profile" class="w-9 h-9 object-cover">

                </div>
            </div>
            <!-- <title> -->
            <div class="text-center mb-4">
                <h1 class="text-2xl font-bold text-black">Create Account</h1>
                <p class="text-gray-600 text-sm mt-2">Join us today! It only takes a minute.</p>

            </div>
            <!-- <form> -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-8">
               <div>
                 <label for="name" class="text-sm font-semibold text-gray-600">Full Name</label>
                <input type="text" name="" id="name" placeholder="John Doe" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg">
               </div>
               <div>
                 <label for="email" class="text-sm font-semibold text-gray-600">Email Address
                    
                </label>
                <input type="email" name="" id="email" placeholder="name@company.com" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg font-sm">

               </div>
              

            </div>
             <div class="mt-4">
                 <label for="password" class="text-sm font-semibold text-gray-600">Password</label>
                <input type="password" placeholder="........" name="password" id="password" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg">
               </div>
               <div class="mt-4">
                    <label for="confirm_password" class="text-sm font-semibold text-gray-600">Confirm Password</label>
                    <input type="password" placehplder="........" name="confirm_password" id="confirm_password" class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg">
               </div>
               <div class="mt-4">
                <input type="checkbox" name="" id="">
                <label for="terms" class="text-sm text-gray-600">I agree to the <a href="#" class="text-blue-500 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-500 hover:underline">Privacy Policy</a></label>
               </div>
               <div class="mt-4">
                <input type="button" value="Create My Account >>" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-300" id="btn">
               </div>
               <div>
                <p class="text-sm text-gray-600 mt-4 text-center">Already have an account? <a href="login.html" class="text-blue-500 hover:underline">Sign in here</a></p>
               </div>
            
            </section>
    
    
</body>
</html>
